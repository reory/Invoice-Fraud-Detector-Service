[pytest]
# Look for tests in this directory
testpaths = tests

# Always run with these flags: 
# -v: verbose (shows which specific tests passed)
# -ra: show extra summary info at the end
addopts = -v -ra

# Ignore the virtual environment folder
norecursedirs = venv .git

# Register custom markers (prevents warnings)
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    api: tests related to the Flask API