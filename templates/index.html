<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Fraud Detector Service</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --success: #4caf50;
            --warning: #ff9800;
            --danger: #f44336;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: var(--card-bg); padding: 30px; border-radius: 15px; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; align-items: center; }

        /* --- THE GAUGE (FIXED) --- */
        .gauge-container {
            position: relative;
            width: 250px;
            height: 125px; /* Half of width */
            margin: 0 auto;
        }

        /* The Grey Background Arch */
        .gauge-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #333;
            border-radius: 250px 250px 0 0; /* Semi-circle */
        }

        /* The Colored Progress Arch */
        .gauge-fill {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--success);
            border-radius: 250px 250px 0 0;
            transform-origin: center bottom;
            transform: rotate(-180deg); /* Hidden initially */
            transition: transform 1s ease, background 1s;
        }

        /* The Inner Cover (to make it a ring) */
        .gauge-cover {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 190px;
            height: 95px;
            background: var(--card-bg);
            border-radius: 190px 190px 0 0;
            z-index: 5;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 10px;
        }

        /* THE NEEDLE (The White Line) */
        .needle {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 4px;
            height: 110px; /* Length */
            background: #ffffff;
            border-radius: 4px;
            transform-origin: bottom center;
            transform: translateX(-50%) rotate(-90deg); /* Start at 0% */
            z-index: 10;
            transition: transform 1.2s cubic-bezier(0.17, 0.88, 0.32, 1.28);
            box-shadow: 0 0 8px rgba(0,0,0,0.5);
        }

        /* Inputs & Table */
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #252525; color: white; box-sizing: border-box; }
        button { background: #3498db; border: none; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #333; }
        .text-fraud { color: var(--danger); }
        .text-clear { color: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Invoice Fraud Detector Service</h1>
    <div class="dashboard-grid">
        <div class="input-panel">
            <input type="text" id="invoice_id" placeholder="ID">
            <input type="text" id="vendor_name" placeholder="Vendor">
            <input type="number" id="amount" placeholder="Amount (£)">
            <select id="category">
                <option value="Software">Software</option>
                <option value="Consulting">Consulting</option>
                <option value="Utilities">Utilities</option>
            </select>
            <button type="button" onclick="loadSample()" style="background: #27ae60; margin-bottom: 5px;">🎲 Load Random Sample</button>
            <button onclick="runAnalysis()">Run Fraud Analysis</button>
        </div>

        <div class="gauge-wrapper">
            <h3 style="text-align: center;">Risk Level</h3>
            <div class="gauge-container">
                <div class="gauge-bg"></div>
                <div class="gauge-fill" id="gaugeFill"></div>
                <div class="needle" id="gaugeNeedle"></div>
                <div class="gauge-cover">
                    <span id="gaugeText" style="font-size: 24px; font-weight: bold;">0%</span>
                    <small id="verdictLabel">READY</small>
                </div>
            </div>
        </div>
    </div>

    <table id="historyTable">
        <thead><tr><th>ID</th><th>Vendor</th><th>Amount</th><th>Risk</th><th>Verdict</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script>
    async function runAnalysis() {
        const payload = {
            invoice_id: document.getElementById('invoice_id').value || "INV-001",
            vendor_name: document.getElementById('vendor_name').value,
            amount: parseFloat(document.getElementById('amount').value) || 0,
            category: document.getElementById('category').value,
            invoice_date: new Date().toISOString().split('T')[0],
            invoice_time: 1200,
            payment_terms: "Net 30",
            submitted_by: "Web_User",
            vendor_rating: 5.0,
            bank_account_change: false,
            is_govt_official: false,
            currency: "GBP",
            is_duplicate: false
        };

        try {
            const response = await fetch('http://127.0.0.1:5000/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const res = await response.json();

            const prob = parseFloat(res.confidence.replace('%', '')) / 100;

            // 1. Move Needle (-90 to +90 degrees)
            const needleDegrees = (prob * 180) - 90;
            document.getElementById('gaugeNeedle').style.transform = `translateX(-50%) rotate(${needleDegrees}deg)`;
            
            // 2. Move Fill (-180 to 0 degrees)
            const fillDegrees = (prob * 180) - 180;
            const fill = document.getElementById('gaugeFill');
            fill.style.transform = `rotate(${fillDegrees}deg)`;
            document.getElementById('gaugeText').innerText = res.confidence;

            // 3. Color Logic
            let color = '#4caf50';
            if (prob > 0.4) color = '#ff9800';
            if (prob > 0.7) color = '#f44336';
            fill.style.backgroundColor = color;

            // 4. Update Table
            const tableBody = document.querySelector('#historyTable tbody');
            const row = tableBody.insertRow(0);
            row.innerHTML = `<td>${res.invoice_id}</td><td>${payload.vendor_name}</td><td>£${payload.amount}</td><td>${res.confidence}</td><td class="${res.is_fraud ? 'text-fraud' : 'text-clear'}">${res.verdict}</td>`;
            document.getElementById('verdictLabel').innerText = res.verdict;

        } catch (err) { alert("Check Flask/CORS!"); }
    }
    async function loadSample() {
        try {
            const response = await fetch('http://127.0.0.1:5000/get_sample');
            const data = await response.json();

            if (data.error) throw new Error(data.error);

            // This fills your input boxes automatically
            document.getElementById('invoice_id').value = data.invoice_id;
            document.getElementById('vendor_name').value = data.vendor_name;
            document.getElementById('amount').value = data.amount;
            document.getElementById('category').value = data.category;

        } catch (err) {
            console.error("Failed to load sample:", err);
            alert("Make sure Flask is running and the CSV exists!");
        }
    }
</script>
</body>
</html>
